name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `mktg ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`mktg doctor --json` output"
      render: json
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: mktg version
      placeholder: "0.3.2"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS / runtime version
      placeholder: "macOS 15.4 / Bun 1.2.0 (or Node 22.x)"
    validations:
      required: false
