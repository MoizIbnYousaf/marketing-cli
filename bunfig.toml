# Scope `bun test` (no args) to marketing-cli's tests/ directory.
# Without this, bun walks the entire repo and discovers studio/tests/ as well,
# which belong to the bundled mktg-studio workspace and have their own runner
# config (next/react/playwright). Studio's tests run via `bun run --cwd studio test`.
#
# Note: this excludes the 2 colocated unit tests under src/
# (src/core/agents.test.ts, src/commands/update.test.ts). Those are still
# runnable explicitly with `bun test src`. A follow-up will relocate them
# under tests/ so a single root keeps full coverage.
[test]
root = "./tests"

# Force hoisted (npm-style flat) node_modules layout.
#
# Why: Bun >= 1.3 defaults to the "isolated" linker, which symlinks every
# package through node_modules/.bun/<pkg>@<version>/node_modules/. That layout
# breaks TypeScript's resolution of triple-slash `<reference types="..." />`
# directives — specifically, bun-types/index.d.ts says
# `/// <reference types="node" />`, and through symlinks tsc can't reach
# @types/node from a `"types": ["bun-types"]` tsconfig. Result: the
# `marketing-cli-typecheck` suite fails in CI on a clean install while
# passing locally where leftover hoisted node_modules cached the old layout.
#
# Hoisted matches the original install convention this codebase was authored
# under and makes `bun install` deterministic across local + CI.
[install]
linker = "hoisted"
