<!doctype html>
<html><head><meta charset="utf-8"><title>mktg brand playground</title>
<style>
:root{--bg:#0b1220;--fg:#e8eefc;--accent:#34d399;--muted:#9db0d0}
body{margin:0;font-family:ui-sans-serif,system-ui;background:var(--bg);color:var(--fg)}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:48px;background:radial-gradient(ellipse at top, #12203a, var(--bg))}
h1{font-size:56px;margin:0 0 12px;letter-spacing:-.03em}
.brand{color:var(--accent);font-family:ui-monospace,monospace;font-size:18px}
.sub{max-width:560px;color:var(--muted);font-size:20px;line-height:1.4}
.cta{margin-top:28px;display:inline-block;padding:12px 18px;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-family:ui-monospace,monospace}
.swatches{display:flex;gap:12px;margin-top:40px}
.swatches i{width:48px;height:48px;display:block;border-radius:8px}
</style></head><body>
<section class="hero">
  <div class="brand">mktg</div>
  <h1>CLI for the agent.<br>Studio for the human.</h1>
  <p class="sub">64 skills. 6 research agents. Brand memory that compounds. Dogfood preview from /brand-kit-playground.</p>
  <a class="cta" href="#">npm i -g marketing-cli</a>
  <div class="swatches" aria-label="palette">
    <i style="background:#0b1220;border:1px solid #243353"></i>
    <i style="background:#34d399"></i>
    <i style="background:#e8eefc"></i>
    <i style="background:#12203a"></i>
  </div>
</section>
</body></html>
